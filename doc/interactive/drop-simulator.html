<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drop Simulator — Treasure Class Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 1.2rem; margin-bottom: 1rem; color: #c9a84c; font-family: system-ui; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem; }
  .controls label { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #aaa; }
  .controls input { width: 80px; padding: 0.3rem; background: #2a2a4e; color: #e0e0e0; border: 1px solid #4a4a6e; border-radius: 3px; text-align: center; }
  .controls button { background: #3a5a3a; color: #e0e0e0; border: 1px solid #5a7a5a; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  .controls button:hover { background: #4a6a4a; }
  .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; width: 100%; max-width: 800px; margin-bottom: 1rem; }
  .stat-card { background: #1e1e3e; border: 1px solid #3a3a5e; border-radius: 6px; padding: 0.6rem; }
  .stat-card .label { font-size: 0.7rem; color: #8a8aaa; }
  .stat-card .value { font-size: 1.3rem; color: #c9a84c; font-weight: bold; }
  .log { width: 100%; max-width: 800px; background: #0d0d1a; border: 1px solid #3a3a4e; border-radius: 6px; padding: 0.5rem; height: 200px; overflow-y: auto; font-size: 0.8rem; line-height: 1.4; }
  .log div { opacity: 0.9; }
  .unique { color: #c9a84c; }
  .set { color: #6a4; }
  .rare { color: #aa6; }
  .magic { color: #48a; }
  .normal { color: #aaa; }
  .elapsed { font-size: 0.7rem; color: #666; }
</style>
</head>
<body>
<h1>Drop Simulator — Treasure Class / MF Demo</h1>
<div class="controls">
  <label>TC<input id="tcName" value="fallen" size="10"></label>
  <label>MF %<input id="mf" value="0" type="number" min="0" max="1000"></label>
  <label>Players<input id="players" value="1" type="number" min="1" max="8"></label>
  <label>Kills<input id="kills" value="10000" type="number" min="100" max="1000000"></label>
  <label>Seed<input id="seed" value="1337" type="number" min="0"></label>
  <button onclick="runSim()">▶ Simulate</button>
  <button onclick="stopSim()">■ Stop</button>
</div>

<div class="results" id="results">
  <div class="stat-card"><div class="label">Total drops</div><div class="value" id="totalDrops">-</div></div>
  <div class="stat-card"><div class="label">Unique</div><div class="value unique" id="uniqCount">-</div></div>
  <div class="stat-card"><div class="label">Set</div><div class="value set" id="setCount">-</div></div>
  <div class="stat-card"><div class="label">Rare</div><div class="value rare" id="rareCount">-</div></div>
  <div class="stat-card"><div class="label">Magic</div><div class="value magic" id="magicCount">-</div></div>
  <div class="stat-card"><div class="label">Superior</div><div class="value" id="supCount">-</div></div>
  <div class="stat-card"><div class="label">Normal</div><div class="value normal" id="normCount">-</div></div>
  <div class="stat-card"><div class="label">Unique %</div><div class="value" id="uniqPct">-</div></div>
  <div class="stat-card"><div class="label">Gold drops</div><div class="value" id="goldCount">-</div></div>
  <div class="stat-card"><div class="label">Potion drops</div><div class="value" id="potCount">-</div></div>
</div>

<div class="log" id="log">
  <div>— Drop simulator loaded. Configure parameters and click Simulate.</div>
  <div class="elapsed">— Uses deterministic weighted-loot model matching TC research.</div>
</div>

<script>
  let running = false;
  let stopped = false;

  // Seeded PRNG (mulberry32) — same seed + same params => identical results
  class RNG {
    constructor(seed) { this.s = seed >>> 0; }
    next() {
      this.s = (this.s + 0x6D2B79F5) >>> 0;
      let t = this.s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    int(n) { return Math.floor(this.next() * n); }
    roll(n) { return this.next() < n; }
  }

  // Simplified TC definitions (representative weights)
  const TCS = {
    "fallen": {
      picks: 1, noDrop: 100,
      entries: [
        { type: "item", weight: 30, range: "normal_weapons" },
        { type: "item", weight: 30, range: "normal_armor" },
        { type: "gold", weight: 40, min: 2, max: 15 },
        { type: "potion", weight: 50 }
      ]
    },
    "skeleton": {
      picks: 1, noDrop: 85,
      entries: [
        { type: "item", weight: 25, range: "normal_weapons" },
        { type: "item", weight: 25, range: "normal_armor" },
        { type: "gold", weight: 30, min: 5, max: 30 },
        { type: "potion", weight: 40 }
      ]
    },
    "boss": {
      picks: -1, noDrop: 15,
      entries: [
        { type: "item", weight: 100, range: "superior" },
        { type: "gold", weight: 80, min: 50, max: 200 },
        { type: "potion", weight: 80 }
      ]
    },
    "tollkeeper": {
      picks: 3, noDrop: 20,
      entries: [
        { type: "item", weight: 60, range: "normal" },
        { type: "gold", weight: 40, min: 10, max: 50 },
        { type: "rune", weight: 20, minTier: 1, maxTier: 4 }
      ]
    }
  };

  const ITEM_RANGES = {
    "normal_weapons": "Sword · Axe · Mace · Bow · Staff · Dagger · Scepter",
    "normal_armor":   "Cap · Helm · Quilted Armor · Leather Armor · Buckler · Small Shield",
    "superior":       "May find items with 5-15% enhanced stats",
    "normal":         "Any base item appropriate for area level"
  };

  // Quality roll with diminishing MF
  function calcMF(mf, factor) {
    return mf * factor / (mf + factor);
  }

  function pickQuality(rng, mf) {
    const effUniq = mf > 0 ? mf * 250 / (mf + 250) : 0;
    const effSet = mf > 0 ? mf * 500 / (mf + 500) : 0;
    const effRare = mf > 0 ? mf * 600 / (mf + 600) : 0;

    // Approximated quality check sequence (simplified)
    const baseUniq = 0.0005; // ~0.05% base
    const r = rng.next();

    if (r < baseUniq * (1 + effUniq / 100)) return "unique";
    if (r < baseUniq * (1 + effUniq / 100) + 0.0015 * (1 + effSet / 100)) return "set";
    if (r < baseUniq * (1 + effUniq / 100) + 0.0015 * (1 + effSet / 100) + 0.04 * (1 + effRare / 100)) return "rare";
    if (r < baseUniq * (1 + effUniq / 100) + 0.0015 * (1 + effSet / 100) + 0.04 * (1 + effRare / 100) + 0.2 * (1 + mf / 100)) return "magic";
    return "normal";
  }

  function runSim() {
    if (running) return;
    running = true; stopped = false;

    const tcName = document.getElementById('tcName').value;
    const mf = parseInt(document.getElementById('mf').value) || 0;
    const players = parseInt(document.getElementById('players').value) || 1;
    const kills = parseInt(document.getElementById('kills').value) || 10000;
    const seedVal = parseInt(document.getElementById('seed').value, 10);
    const seed = Number.isFinite(seedVal) ? (seedVal >>> 0) : 1337;

    const tc = TCS[tcName];
    if (!tc) {
      log(`Unknown TC: "${tcName}". Try: fallen, skeleton, boss, tollkeeper`);
      running = false;
      return;
    }

    log(`Simulating ${kills.toLocaleString()} kills of "${tcName}" (MF: ${mf}%, Players: ${players}, Seed: ${seed})...`);

    const rng = new RNG(seed);
    const counts = { unique: 0, set: 0, rare: 0, magic: 0, superior: 0, normal: 0, gold: 0, potion: 0 };
    let totalItems = 0;

    // NoDrop adjustment per players
    const noDropAdj = tc.noDrop * Math.ceil(128 / (players + 1)) / 128;
    const totalWeight = noDropAdj + tc.entries.reduce((s, e) => s + e.weight, 0);

    function doPick() {
      const r = rng.next() * totalWeight;
      let cum = noDropAdj;
      if (r < cum) return null; // NoDrop
      for (const e of tc.entries) {
        cum += e.weight;
        if (r < cum) return e;
      }
      return null;
    }

    let iter = 0;

    function batch() {
      if (stopped) { running = false; return; }

      const batchSize = Math.min(500, kills - iter);
      for (let i = 0; i < batchSize; i++) {
        if (tc.picks < 0) {
          // Boss drops: always drops all entries (no-drop excluded)
          for (const e of tc.entries) {
            if (e.type === "gold") { counts.gold++; totalItems++; }
            else if (e.type === "potion") { counts.potion++; totalItems++; }
            else {
              const q = pickQuality(rng, mf);
              counts[q]++; totalItems++;
            }
          }
        } else {
          const numPicks = tc.picks;
          for (let p = 0; p < numPicks; p++) {
            const result = doPick();
            if (!result) continue;
            if (result.type === "gold") { counts.gold++; totalItems++; }
            else if (result.type === "potion") { counts.potion++; totalItems++; }
            else if (result.type === "rune") { counts.unique++; totalItems++; } // simplified
            else {
              const q = pickQuality(rng, mf);
              counts[q]++; totalItems++;
            }
          }
        }
        iter++;
      }

      const pct = (iter / kills * 100).toFixed(1);
      document.getElementById('totalDrops').textContent = totalItems.toLocaleString();
      document.getElementById('uniqCount').textContent = counts.unique.toLocaleString();
      document.getElementById('setCount').textContent = counts.set.toLocaleString();
      document.getElementById('rareCount').textContent = counts.rare.toLocaleString();
      document.getElementById('magicCount').textContent = counts.magic.toLocaleString();
      document.getElementById('supCount').textContent = counts.superior.toLocaleString();
      document.getElementById('normCount').textContent = counts.normal.toLocaleString();
      document.getElementById('uniqPct').textContent = (counts.unique / Math.max(1, totalItems) * 100).toFixed(3) + '%';
      document.getElementById('goldCount').textContent = counts.gold.toLocaleString();
      document.getElementById('potCount').textContent = counts.potion.toLocaleString();

      if (iter < kills && !stopped) {
        setTimeout(batch, 0);
      } else {
        running = false;
        log(`Done. ${kills.toLocaleString()} kills, ${totalItems.toLocaleString()} drops (seed ${seed})`);
        log(`  Unique: ${counts.unique} (${(counts.unique/Math.max(1,totalItems)*100).toFixed(3)}%)`);
        log(`  Set:    ${counts.set} (${(counts.set/Math.max(1,totalItems)*100).toFixed(3)}%)`);
        log(`  Rare:   ${counts.rare} (${(counts.rare/Math.max(1,totalItems)*100).toFixed(3)}%)`);
        log(`  Magic:  ${counts.magic} (${(counts.magic/Math.max(1,totalItems)*100).toFixed(3)}%)`);
      }
    }

    batch();
  }

  function stopSim() {
    stopped = true;
    log("Simulation stopped.");
  }

  function log(msg) {
    const el = document.getElementById('log');
    const d = document.createElement('div');
    d.textContent = msg;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  }

  // Run defaults on load
  setTimeout(() => runSim(), 500);
</script>
</body>
</html>
