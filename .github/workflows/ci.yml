name: ci

on:
  push:
    branches: [main]
  pull_request:

# Node 24 (native TS type-stripping for `node *.ts` dev scripts). Determinism is guarded by
# the cross-OS test matrix, not the Node version — the sim avoids transcendentals so IEEE-754
# double ops are engine-stable.
env:
  NODE_VERSION: "24"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Biome + sim-purity + import-boundary
        run: npm run lint

  ip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: IP audit (no Blizzard proper nouns)
        run: node scripts/ip-audit.mjs

  test:
    # Cross-OS matrix is itself a determinism gate: golden replay hashes must match
    # bit-for-bit on Linux and Windows.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run check
      - name: Vitest (unit + data + golden replays)
        run: npm test

  build-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle size gate (≤ 1.2 MB gzip)
        run: npm run size
